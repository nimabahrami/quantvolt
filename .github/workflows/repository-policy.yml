name: Repository and package policy

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Reject large ordinary Git files
        run: python scripts/ci/check_repository_size.py
      - name: Verify catalog JSON
        run: python -m json.tool src/quantvolt/data/dataset_catalog.json >/dev/null
      - name: Build distribution wheel
        run: |
          python -m pip install maturin
          maturin build --release --out dist
      - name: Reject datasets in wheel
        run: python scripts/ci/check_wheel_contents.py dist/*.whl
